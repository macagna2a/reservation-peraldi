<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Gestion des événements · Domaine Peraldi</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
<style>
:root{
  --navy:#1F3A5F; --navy2:#16293f; --orange:#A9842B; --orange-d:#8c6f24; --charcoal:#2c2925; --charcoal2:#1b1916; --gold:#A9842B; --gold-line:#CBA24A;
  --bg:#0f1c2b; --panel:#fff; --line:#e2e8f0; --ink:#1e293b; --muted:#64748b;
  --green:#16a34a; --red:#dc2626; --amber:#d97706;
  --c-mange:#38b6e8; --c-tonneau:#7fc93a; --c-ronde:#e67e22; --c-rect:#ff4fb0;
  --c-traiteur:#2233aa; --c-ballot:#e3b53d; --c-orange:#f0962a;
}
*{box-sizing:border-box}
html,body{margin:0;height:100%;font-family:'Outfit',system-ui,sans-serif;color:var(--ink);background:var(--bg);overflow:hidden}
button{font-family:inherit;cursor:pointer;border:none}
.app{display:flex;flex-direction:column;height:100vh;height:100dvh}

/* ---- top bar ---- */
header{background:linear-gradient(100deg,var(--charcoal),var(--charcoal2));color:#fff;padding:8px 14px;display:flex;align-items:center;gap:14px;flex-wrap:wrap;box-shadow:0 2px 10px rgba(0,0,0,.35);border-bottom:2px solid var(--gold-line);z-index:30}
header .brand{display:flex;flex-direction:column;line-height:1.05}
header .brand b{font-family:'Cinzel',serif;font-size:15px;font-weight:700;letter-spacing:.6px;color:#f3ecdd}
header .brand span{font-size:11px;color:#c7b487}
.stats{display:flex;gap:8px;flex-wrap:wrap;margin-left:auto}
.stat{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);border-radius:10px;padding:5px 11px;min-width:70px}
.stat .k{font-size:10px;text-transform:uppercase;letter-spacing:.4px;color:#9fb1c6}
.stat .v{font-size:17px;font-weight:800}
.stat .v small{font-size:11px;font-weight:600;color:#9fb1c6}
.actions{display:flex;gap:7px;flex-wrap:wrap}
.btn{background:rgba(255,255,255,.12);color:#fff;border-radius:9px;padding:8px 12px;font-size:12.5px;font-weight:600;display:inline-flex;align-items:center;gap:6px;transition:.15s}
.btn:hover{background:rgba(255,255,255,.22)}
.btn.primary{background:var(--orange)} .btn.primary:hover{background:var(--orange-d)}
.btn.ghost{background:transparent;border:1px solid rgba(255,255,255,.25)}
.syncpill{display:inline-flex;align-items:center;font-size:11.5px;font-weight:700;border-radius:9px;padding:8px 11px;color:#fff;white-space:nowrap}
.syncpill.ok{background:rgba(34,197,94,.28)}
.syncpill.save{background:rgba(230,126,34,.32)}
.syncpill.off{background:rgba(220,38,38,.30)}
.eventbar{display:flex;align-items:center;gap:7px;padding:7px 12px;background:#26231f;border-top:1px solid rgba(203,162,74,.42);overflow-x:auto;z-index:20;flex-wrap:nowrap}
.evtab{flex:none;display:flex;align-items:center;gap:7px;background:rgba(255,255,255,.08);color:#cdd9e6;border-radius:9px;padding:7px 12px;font-size:12.5px;font-weight:600;cursor:pointer;white-space:nowrap}
.evtab.on{background:var(--orange);color:#241f15}
.evtab button{background:transparent;color:inherit;font-size:13px;padding:0 1px;opacity:.75}
.evtab button:hover{opacity:1}
.evtadd{flex:none;background:transparent;border:1px dashed rgba(255,255,255,.3);color:#cdd9e6;border-radius:9px;padding:7px 12px;font-size:12.5px;font-weight:600;white-space:nowrap}
.evtadd:hover{background:rgba(255,255,255,.08)}
.evtbg{flex:none;margin-left:auto;background:rgba(255,255,255,.08);color:#cdd9e6;border-radius:9px;padding:7px 12px;font-size:12px;font-weight:600;white-space:nowrap}
.evtbg:hover{background:rgba(255,255,255,.18)}

/* ---- main split ---- */
.main{flex:1;display:flex;min-height:0}
.stagewrap{flex:1;position:relative;background:#0b1622;overflow:auto;min-width:0}
.stage{position:relative;background-repeat:no-repeat;background-size:100% 100%;transform-origin:0 0}
.bgveil{position:absolute;inset:0;background:#0b1622;pointer-events:none}

/* ---- furniture markers ---- */
.fz{position:absolute;display:flex;align-items:center;justify-content:center;font-weight:800;color:#08243a;text-shadow:0 1px 0 rgba(255,255,255,.45);user-select:none;touch-action:none;border:2px solid rgba(0,0,0,.25);box-shadow:0 2px 5px rgba(0,0,0,.35);transition:box-shadow .12s, outline-color .12s;outline:3px solid transparent}
.fz.round{border-radius:50%}
.fz.hex{clip-path:polygon(25% 6%,75% 6%,100% 50%,75% 94%,25% 94%,0 50%)}
.fz.sq{border-radius:7px}
.fz.rect{border-radius:8px;color:#fff;text-shadow:0 1px 2px rgba(0,0,0,.5);font-size:12px;letter-spacing:.3px}
.fz.zone{border-radius:10px;color:#fff;font-weight:800;text-shadow:0 1px 2px rgba(0,0,0,.5);font-size:12px;border-style:dashed}
.fz.sel{outline-color:#fff;box-shadow:0 0 0 2px var(--navy),0 4px 12px rgba(0,0,0,.5);z-index:20}
.fz.occupied{filter:saturate(1.15)}
.fz.full{outline-color:var(--amber)}
.fz.over{outline-color:var(--red);box-shadow:0 0 0 2px var(--red),0 4px 12px rgba(0,0,0,.5)}
.fz .badge{position:absolute;top:-7px;right:-7px;background:var(--navy);color:#fff;border:2px solid #fff;border-radius:20px;min-width:18px;height:18px;padding:0 4px;font-size:10px;display:flex;align-items:center;justify-content:center;text-shadow:none;font-weight:700}
.fz .rot{position:absolute;top:-24px;left:50%;width:17px;height:17px;border-radius:50%;background:#fff;border:2px solid var(--navy);transform:translateX(-50%);cursor:grab;box-shadow:0 1px 4px rgba(0,0,0,.45);touch-action:none;z-index:22}
.fz .rot::after{content:"↻";position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--navy);font-weight:700}
.fz .rot::before{content:"";position:absolute;left:50%;top:15px;width:2px;height:11px;background:var(--navy);transform:translateX(-50%)}
.fz.pulse{animation:pulse 1s ease infinite}
@keyframes pulse{0%,100%{outline-color:var(--gold-line)}50%{outline-color:transparent}}

/* zoom + opacity controls */
.mapctl{position:absolute;left:12px;bottom:12px;display:flex;flex-direction:column;gap:8px;z-index:25}
.mapctl .grp{background:rgba(15,28,43,.85);border:1px solid rgba(255,255,255,.15);border-radius:12px;padding:6px;display:flex;flex-direction:column;gap:5px;backdrop-filter:blur(4px)}
.mapctl button{width:40px;height:38px;border-radius:8px;background:rgba(255,255,255,.12);color:#fff;font-size:18px;font-weight:700}
.mapctl button:hover{background:rgba(255,255,255,.25)}
.mapctl .opacity{flex-direction:row;align-items:center;gap:8px;padding:8px 11px;color:#cdd9e6;font-size:11px}
.mapctl input[type=range]{width:90px;accent-color:var(--orange)}
.modepill{position:absolute;top:12px;left:50%;transform:translateX(-50%);z-index:25;background:rgba(15,28,43,.9);border:1px solid rgba(255,255,255,.18);border-radius:30px;padding:4px;display:flex;gap:3px;backdrop-filter:blur(4px)}
.modepill button{padding:7px 15px;border-radius:24px;color:#cdd9e6;background:transparent;font-size:12.5px;font-weight:700}
.modepill button.on{background:var(--orange);color:#241f15}
.hint{position:absolute;top:58px;left:50%;transform:translateX(-50%);z-index:24;background:rgba(230,126,34,.95);color:#fff;padding:7px 15px;border-radius:24px;font-size:12.5px;font-weight:600;box-shadow:0 4px 14px rgba(0,0,0,.4);max-width:90%;text-align:center}

/* ---- sidebar ---- */
.side{width:360px;max-width:42vw;background:var(--panel);display:flex;flex-direction:column;box-shadow:-3px 0 14px rgba(0,0,0,.25);z-index:10}
.tabs{display:flex;border-bottom:1px solid var(--line)}
.tabs button{flex:1;padding:13px 6px;font-size:13px;font-weight:700;color:var(--muted);background:#fff;border-bottom:3px solid transparent}
.tabs button.on{color:var(--navy);border-bottom-color:var(--gold-line)}
.side .body{flex:1;overflow:auto;padding:12px}
.search{width:100%;padding:10px 12px;border:1.5px solid var(--line);border-radius:10px;font-size:13px;margin-bottom:9px}
.search:focus{outline:none;border-color:var(--gold-line)}
.filters{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:11px}
.chip{font-size:11.5px;font-weight:600;padding:5px 10px;border-radius:18px;background:#eef2f7;color:#475569;border:1px solid transparent}
.chip.on{background:var(--navy);color:#fff}
.chip.on.attente{background:var(--amber)}

.rcard{border:1.5px solid var(--line);border-radius:12px;padding:10px 11px;margin-bottom:8px;background:#fff;transition:.12s;position:relative}
.rcard:hover{border-color:#c8d3e0;box-shadow:0 2px 7px rgba(0,0,0,.06)}
.rcard.placed{background:#f1fbf4;border-color:#bfe6cb}
.rcard.sel{border-color:var(--orange);box-shadow:0 0 0 2px rgba(230,126,34,.25)}
.rcard .top{display:flex;justify-content:space-between;align-items:start;gap:8px}
.rcard .nom{font-weight:700;font-size:13.5px;color:var(--ink)}
.rcard .pax{background:var(--navy);color:#fff;font-size:12px;font-weight:700;border-radius:8px;padding:3px 9px;white-space:nowrap}
.rcard .meta{font-size:11.5px;color:var(--muted);margin-top:3px;display:flex;gap:7px;flex-wrap:wrap;align-items:center}
.cat{font-size:10.5px;font-weight:700;padding:2px 8px;border-radius:12px;text-transform:uppercase;letter-spacing:.3px}
.rcard .note{font-size:11.5px;color:#475569;margin-top:5px;font-style:italic}
.rcard .note.pref{color:var(--orange-d);font-weight:600;font-style:normal}
.rcard .assigned{margin-top:7px;font-size:12px;font-weight:700;color:var(--green);display:flex;align-items:center;gap:6px}
.rcard .assigned button{font-size:11px;color:var(--red);background:#fee;border-radius:6px;padding:2px 7px;font-weight:600}
.tinybtn{font-size:11.5px;font-weight:600;color:var(--navy);background:#eef2f7;border-radius:7px;padding:5px 9px;margin-top:7px}
.tinybtn:hover{background:#e2e8f0}
.addresa{width:100%;padding:11px;border-radius:10px;background:#eef2f7;color:var(--navy);font-weight:700;font-size:13px;margin-bottom:10px;border:1.5px dashed #c3d0df}
.addresa:hover{background:#e6edf5}
.iconbtn{background:#eef2f7;color:var(--navy);border-radius:7px;width:28px;height:26px;font-size:13px;font-weight:700;flex:none}
.iconbtn:hover{background:#e2e8f0}

.palette{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.palette button{padding:11px 8px;border-radius:11px;font-weight:700;font-size:12.5px;color:#fff;display:flex;flex-direction:column;align-items:center;gap:4px;border:2px solid rgba(0,0,0,.12)}
.palette .ico{width:26px;height:26px;border-radius:50%;border:2px solid rgba(255,255,255,.7)}
.sectlabel{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin:6px 0 8px}
.editrow{display:flex;align-items:center;gap:8px;margin-bottom:9px;font-size:13px}
.editrow label{width:90px;color:var(--muted);font-weight:600}
.editrow input,.editrow select{flex:1;padding:8px;border:1.5px solid var(--line);border-radius:9px;font-size:13px;font-family:inherit}
.assignlist .ai{display:flex;justify-content:space-between;align-items:center;padding:7px 9px;background:#f1fbf4;border:1px solid #bfe6cb;border-radius:9px;margin-bottom:6px;font-size:12.5px}
.assignlist .ai button{color:var(--red);background:#fee;border-radius:6px;padding:3px 8px;font-size:11px;font-weight:700}
.del{background:#fee2e2;color:var(--red);width:100%;padding:11px;border-radius:10px;font-weight:700;margin-top:6px}
.empty{color:var(--muted);text-align:center;padding:30px 10px;font-size:13px}

/* modal */
.modal-bg{position:fixed;inset:0;background:rgba(8,16,28,.55);display:none;align-items:center;justify-content:center;z-index:60;padding:16px}
.modal-bg.show{display:flex}
.modal{background:#fff;border-radius:16px;max-width:440px;width:100%;max-height:86vh;overflow:auto;box-shadow:0 20px 60px rgba(0,0,0,.4)}
.modal h3{margin:0;padding:16px 18px;background:var(--navy);color:#fff;font-size:15px;border-radius:16px 16px 0 0;display:flex;justify-content:space-between;align-items:center}
.modal h3 button{color:#fff;background:rgba(255,255,255,.15);border-radius:8px;width:30px;height:30px;font-size:18px}
.modal .mbody{padding:16px 18px}
.modal .qsearch{position:relative}
.modal .results{max-height:230px;overflow:auto;margin-top:6px;border:1px solid var(--line);border-radius:10px}
.modal .results div{padding:9px 11px;border-bottom:1px solid #f1f5f9;font-size:13px;cursor:pointer;display:flex;justify-content:space-between;gap:8px}
.modal .results div:hover{background:#fff7ef}
.modal .results div:last-child{border-bottom:none}
.cap-row{display:flex;align-items:center;gap:10px;background:#f8fafc;border-radius:11px;padding:11px;margin-bottom:13px}
.cap-row .occ{font-size:22px;font-weight:800;color:var(--navy)}
.cap-row .occ small{font-size:13px;color:var(--muted);font-weight:600}
.cap-row input{width:62px;padding:7px;border:1.5px solid var(--line);border-radius:8px;font-size:14px;text-align:center;font-weight:700}
.barfill{height:7px;border-radius:6px;background:#e2e8f0;overflow:hidden;flex:1}
.barfill i{display:block;height:100%;background:var(--green);border-radius:6px}

@media(max-width:760px){
  .side{position:fixed;right:0;top:0;bottom:0;width:88%;max-width:none;transform:translateX(100%);transition:transform .25s}
  .side.open{transform:none}
  .stats .stat{min-width:58px;padding:4px 8px}
  .stat .v{font-size:15px}
  .palette{grid-template-columns:1fr 1fr}
  .togglefab{display:flex}
}
.togglefab{display:none;position:fixed;right:14px;bottom:14px;z-index:55;background:var(--orange);color:#241f15;border-radius:30px;padding:13px 18px;font-weight:700;font-size:14px;box-shadow:0 6px 18px rgba(0,0,0,.35);align-items:center;gap:7px}
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--navy);color:#fff;padding:11px 18px;border-radius:11px;font-size:13px;font-weight:600;opacity:0;transition:.25s;z-index:70;box-shadow:0 8px 24px rgba(0,0,0,.4);pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
#tip{position:fixed;z-index:65;background:#0f1c2b;color:#fff;border:1px solid rgba(255,255,255,.16);border-radius:12px;padding:10px 13px;max-width:270px;font-size:12.5px;line-height:1.45;box-shadow:0 12px 34px rgba(0,0,0,.5);pointer-events:none;display:none}
#tip .th{font-weight:800;font-size:13px;margin-bottom:4px;display:flex;justify-content:space-between;gap:12px}
#tip .occ{color:#f0a85a;font-weight:700;white-space:nowrap}
#tip .free{color:#7fd39a;font-weight:600}
#tip .ri{padding:6px 0 2px;border-top:1px solid rgba(255,255,255,.1);margin-top:4px}
#tip .ri .nm{font-weight:700}
#tip .ri .mt{color:#9fb1c6;font-size:11.5px}
#tip .ri .pr{color:#f0a85a}

/* --- finition « domaine » --- */
.modal h3{background:linear-gradient(100deg,var(--charcoal),var(--charcoal2));color:#f3ecdd;font-family:'Cinzel',serif;font-weight:600;letter-spacing:.4px;border-bottom:2px solid var(--gold-line)}
.modal h3 button{background:rgba(255,255,255,.16)}
.side{background:#faf8f4}
.tabs{background:#faf8f4;border-bottom:1px solid #e7e0d4}
.tabs button{background:#faf8f4;text-transform:uppercase;letter-spacing:.6px;font-size:12px}
.tabs button.on{color:var(--charcoal);border-bottom-color:var(--gold-line)}
.sectlabel{color:#9a7d3c;letter-spacing:.8px}
.stat{background:rgba(255,255,255,.06);border-color:rgba(203,162,74,.42)}
.stat .k{color:#cbb27e}
.stat .v small{color:#a99873}
.stagewrap{box-shadow:inset 0 0 0 1px rgba(0,0,0,.22), inset 0 0 90px rgba(0,0,0,.33)}
.search:focus{border-color:var(--gold-line)}
.chip.on{background:var(--charcoal)}
.chip.on.attente{background:var(--amber)}
.rcard.sel{box-shadow:0 0 0 2px rgba(203,162,74,.5)}
.btn{border:1px solid rgba(196,154,58,0)}
.btn:hover{border-color:rgba(203,162,74,.6)}
.modepill{border-color:rgba(203,162,74,.5)}
.modepill button.on{color:#241f15}
.tinybtn{color:var(--charcoal)}
.togglefab{background:var(--gold);color:#241f15}
#login{position:fixed;inset:0;z-index:200;background:linear-gradient(140deg,#2c2925,#16140f);display:none;align-items:center;justify-content:center;padding:20px}
#login .logcard{background:#faf8f4;border-radius:16px;border-top:3px solid var(--gold-line);padding:26px 24px;width:300px;max-width:92vw;text-align:center;box-shadow:0 18px 50px rgba(0,0,0,.5)}
#login .logttl{font-family:'Cinzel',serif;font-size:20px;font-weight:700;color:#2c2925;letter-spacing:.6px}
#login .logsub{font-size:12px;color:#9a7d3c;margin:2px 0 16px;letter-spacing:.4px}
#login .loglab{display:block;text-align:left;font-size:12px;color:#475569;margin-bottom:4px;font-weight:600}
#login input{width:100%;padding:11px 12px;border:1px solid #d8d2c6;border-radius:10px;font-size:15px;box-sizing:border-box}
#login input:focus{outline:none;border-color:var(--gold-line)}
#login button{width:100%;margin-top:12px;background:var(--gold);color:#241f15;border:none;border-radius:10px;padding:12px;font-weight:700;font-size:14px;cursor:pointer}
#login .logerr{color:#b91c1c;font-size:12px;min-height:16px;margin-top:8px}
.roBadge{display:none;align-items:center;gap:5px;background:rgba(255,255,255,.10);border:0.5px solid rgba(203,162,74,.5);color:#e9dcc0;border-radius:9px;padding:6px 10px;font-size:11.5px;font-weight:700}
body:not(.adm) .adminOnly{display:none!important}
body.ro .editOnly{display:none!important}
body.ro .modepill{display:none!important}
</style>
</head>
<body>
<div id="login" style="display:none">
  <div class="logcard">
    <div class="logttl">Domaine Peraldi</div>
    <div class="logsub">Gestion des événements</div>
    <label class="loglab">Code d'accès</label>
    <input id="logCode" type="password" autocomplete="off" placeholder="votre code">
    <button id="logBtn">Entrer</button>
    <div id="logErr" class="logerr"></div>
  </div>
</div>
<div class="app">
  <header>
    <div class="brand"><b>Gestion des événements · Domaine Peraldi</b><span>—</span></div>
    <div class="stats" id="stats"></div>
    <div class="actions">
      <button class="btn" id="modeleBtn">📄 Modèle</button>
      <button class="btn editOnly" id="importBtn">⬆ Importer CSV</button>
      <button class="btn" id="exportBtn">⬇ Exporter</button>
      <button class="btn" id="planPdfBtn">🖨 PDF</button>
      <button class="btn adminOnly" id="accessBtn">👥 Accès</button>
      <button class="btn ghost" id="helpBtn">?</button>
      <span id="syncPill" class="syncpill off">…</span>
      <span class="roBadge" id="roBadge">🔒 Lecture seule</span>
      <input type="file" id="fileIn" accept=".csv" hidden>
      <input type="file" id="bgIn" accept="image/*" hidden>
    </div>
  </header>
  <div class="eventbar" id="eventbar"></div>
  <div class="main">
    <div class="stagewrap" id="stagewrap">
      <div class="modepill">
        <button id="mResa" class="on">📋 Placer les résas</button>
        <button id="mEdit">✏️ Éditer le plan</button>
      </div>
      <div class="hint" id="hint" style="display:none"></div>
      <div class="stage" id="stage"></div>
      <div class="mapctl">
        <div class="grp"><button id="zin">+</button><button id="zout">−</button><button id="zfit" style="font-size:12px">⤢</button></div>
        <div class="grp opacity">Fond<input type="range" id="opa" min="15" max="100" value="100"></div>
      </div>
    </div>
    <aside class="side" id="side">
      <div class="tabs">
        <button id="tabResa" class="on">Réservations</button>
        <button id="tabEdit">Mobilier</button>
      </div>
      <div class="body" id="sideBody"></div>
    </aside>
  </div>
</div>
<button class="togglefab" id="fab">📋 Résas</button>
<div class="modal-bg" id="modalBg"><div class="modal" id="modal"></div></div>
<div class="toast" id="toast"></div>
<div id="tip"></div>

 'ballot':{label:'Ballot de paille',short:'Ballot',color:'var(--c-ballot)',shape:'round',d:58,cap:4,assignable:true},
 'orange-sq':{label:'Repère',short:'Rep.',color:'var(--c-orange)',shape:'sq',d:46,cap:6,assignable:true},
 'scene':{label:'Scène',color:'#e23b2e',shape:'zone',assignable:false},
 'piste':{label:'Piste de danse',color:'#e23b2e',shape:'zone',assignable:false},
 'bar':{label:'Bar',color:'#7a8699',shape:'zone',assignable:false},
 'traiteur-zone':{label:'Traiteur',color:'#7a8699',shape:'zone',assignable:false},
 'custom':{label:'Personnalisé',short:'',color:'#8a5cf6',shape:'round',d:50,cap:0,assignable:false},
};
// per-instance overrides (label/color/shape/cap/assignable) win over the type defaults
function cfg(f){const t=TYPES[f.type]||TYPES['custom'];
  return {label:f.label||t.label||'Meuble',
    short:f.label?f.label:(t.short!=null?t.short:t.label),
    color:f.color||t.color||'#888',
    shape:f.shape||t.shape||'round',
    d:f.d||t.d||48,
    assignable:(f.assignable!=null?f.assignable:(t.assignable||false)),
    cap:(f.cap!=null?f.cap:(t.cap||0))};
}
const CAT_COLORS={'Famille':'#0ea5e9','Grand public':'#8b5cf6','Joueur':'#16a34a','Bénévole':'#d97706','Sponsor':'#dc2626','Partenaire':'#0d9488','Mairie':'#7c3aed','Staff':'#475569'};

const API="/.netlify/functions/state";
let localTs=0, pendingSave=false, pushTimer=null; let ME=null;
let DB=loadDB();
let S=curEvent();
let scale=1, mode='resa', selResa=null, openFurnId=null;
function curEvent(){return DB.events.find(e=>e.id===DB.curId)||DB.events[0];}
function curBg(){return S.builtin?IMG:(S.bg||'');}
function defaultDB(){
  const furn=DEFAULT_FURN.map((f,i)=>({id:'f'+i,n:f.n??null,type:f.type,x:f.x,y:f.y,
     cap:(TYPES[f.type]?.cap??0),L:f.L,Wd:f.Wd,ang:f.ang||0,label:f.label}));
  const resa=DEFAULT_RESA.map(r=>({...r,tableId:null}));
  return normalize({curId:'evt0',users:[{id:'u_admin',name:'Admin',code:'gfca-admin',role:'admin'}],events:[{id:'evt0',name:'Bal du GFCA · 11 juin 2026 · Peraldi',organizer:'GFCA Handball',maxCap:0,builtin:true,bg:null,w:2000,h:2000,furn,resa,access:[]}]});
}
function loadDB(){
  try{const raw=localStorage.getItem('gfca_evt_cache');if(raw){const c=JSON.parse(raw);if(c&&c.db&&c.db.events&&c.db.events.length){localTs=c.ts||0;return normalize(c.db);}}}catch(e){}
  return defaultDB();
}
function cacheSave(){try{localStorage.setItem('gfca_evt_cache',JSON.stringify({ts:localTs,db:DB}));}catch(e){}}
function save(){localTs=Date.now();cacheSave();pendingSave=true;setSync('save');clearTimeout(pushTimer);pushTimer=setTimeout(pushRemote,900);}
async function pushRemote(){
  try{const res=await fetch(API,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(DB)});
    if(!res.ok)throw 0;const j=await res.json();if(j&&j.ts){localTs=j.ts;cacheSave();}pendingSave=false;setSync('ok');}
  catch(e){pendingSave=false;setSync('off');}
}
async function pullRemote(){
  if(pendingSave)return;
  try{const res=await fetch(API,{cache:'no-store'});if(!res.ok)throw 0;const j=await res.json();
    if(j&&j.db&&j.db.events&&(j.ts||0)>localTs){
      if(document.getElementById('modalBg').classList.contains('show'))return;
      DB=normalize(j.db);localTs=j.ts;if(!curEvent())DB.curId=DB.events[0].id;S=curEvent();cacheSave();gateRender();}
    setSync('ok');}
  catch(e){setSync('off');}
}
async function initSync(){
  try{const res=await fetch(API,{cache:'no-store'});if(!res.ok)throw 0;const j=await res.json();
    if(j&&j.db&&j.db.events){if((j.ts||0)>localTs){DB=normalize(j.db);localTs=j.ts;cacheSave();}setSync('ok');}
    else{await pushRemote();}}
  catch(e){setSync('off');}
}
function setSync(s){const el=document.getElementById('syncPill');if(!el)return;el.className='syncpill '+s;
  el.textContent=s==='save'?'⟳ Sauvegarde…':s==='ok'?'✓ Synchronisé':'⚠ Hors ligne';}
/* ---------- profils / accès (léger, côté appli) ---------- */
function normalize(db){if(!db)return db;
  if(!Array.isArray(db.users)||!db.users.length)db.users=[{id:'u_admin',name:'Admin',code:'gfca-admin',role:'admin'}];
  if(!db.users.some(u=>u.role==='admin'))db.users[0].role='admin';
  (db.events||[]).forEach(e=>{if(!Array.isArray(e.access))e.access=[];});return db;}
function myCode(){try{return localStorage.getItem('gfca_code')||'';}catch(e){return '';}}
function resolveMe(){const c=myCode();ME=(DB.users||[]).find(u=>u.code&&u.code===c)||null;return ME;}
function isAdmin(){return !!(ME&&ME.role==='admin');}
function rightFor(e){if(!e)return null;if(isAdmin())return 'edit';const a=(e.access||[]).find(a=>a.u===(ME&&ME.id));return a?a.r:null;}
function canSee(e){return isAdmin()||rightFor(e)!=null;}
function visibleEvents(){return DB.events.filter(canSee);}
function RW(){return !!ME&&rightFor(curEvent())==='edit';}
function applyRole(){document.body.classList.toggle('adm',isAdmin());document.body.classList.toggle('ro',!RW());
  const rb=document.getElementById('roBadge');if(rb)rb.style.display=(ME&&!RW())?'inline-flex':'none';}
function showLogin(msg){const o=document.getElementById('login');if(!o)return;o.style.display='flex';
  document.getElementById('logErr').textContent=msg||'';document.getElementById('logCode').value='';setTimeout(()=>document.getElementById('logCode').focus(),60);}
function hideLogin(){const o=document.getElementById('login');if(o)o.style.display='none';}
function doLogin(){const c=document.getElementById('logCode').value.trim();try{localStorage.setItem('gfca_code',c);}catch(e){}
  if(resolveMe()){hideLogin();gateRender();}else{showLogin('Code non reconnu.');}}
function logout(){try{localStorage.removeItem('gfca_code');}catch(e){}ME=null;closeModal();showLogin('');}
function ensureVisible(){const vis=visibleEvents();if(!vis.length)return;if(!vis.some(e=>e.id===DB.curId)){DB.curId=vis[0].id;S=curEvent();}}
function gateRender(){resolveMe();if(!ME){showLogin('');return;}hideLogin();if(visibleEvents().length===0){DB._empty=DB._empty||{id:'_empty',name:'',organizer:'',maxCap:0,builtin:false,bg:'',w:1200,h:800,furn:[],resa:[],access:[]};S=DB._empty;applyRole();renderEventTabs();fit();renderAll();return;}ensureVisible();if(!RW())mode='resa';applyRole();renderEventTabs();fit();renderAll();}

function occ(fid){return S.resa.filter(r=>r.tableId===fid).reduce((s,r)=>s+(+r.pax||0),0);}
function resasAt(fid){return S.resa.filter(r=>r.tableId===fid);}
function furnById(id){return S.furn.find(f=>f.id===id);}
function R(id){return S.resa.find(x=>String(x.id)===String(id));}
function catColor(c){return CAT_COLORS[(c||'').trim().replace(/\s+$/,'')]||'#64748b';}
function nextNum(){let m=0;S.furn.forEach(f=>{if(f.n>m)m=f.n;});return m+1;}

/* ---------- render plan ---------- */
const stage=document.getElementById('stage');
function fit(){const w=document.getElementById('stagewrap').clientWidth;scale=Math.max(.12,(w-24)/S.w);renderStage();}
function setScale(s){scale=Math.min(2,Math.max(.08,s));renderStage();}
function renderStage(){
  stage.style.width=S.w*scale+'px';stage.style.height=S.h*scale+'px';
  const bg=curBg();
  stage.style.backgroundImage=bg?('url('+bg+')'):'none';
  stage.style.backgroundColor=bg?'transparent':'#1c2c3d';
  stage.innerHTML='';
  S.furn.forEach(f=>stage.appendChild(makeMarker(f)));
}
function makeMarker(f){
  const t=cfg(f);
  const el=document.createElement('div');
  el.className='fz '+(t.shape);
  el.dataset.id=f.id;
  el.style.background=t.color;
  el.style.left=f.x*scale+'px';el.style.top=f.y*scale+'px';
  if(t.shape==='rect'||t.shape==='zone'){
    const L=(f.L||160),W=(f.Wd||46);
    el.style.width=L*scale+'px';el.style.height=Math.max(W,30)*scale+'px';
    el.style.transform=`translate(-50%,-50%) rotate(${f.ang||0}deg)`;
    el.style.fontSize=Math.max(9,Math.min(15,W*scale*.42))+'px';
    el.textContent=f.label?f.label:(f.n!=null?(t.short+' '+f.n):t.short);
  }else{
    const d=(t.d||48)*scale;el.style.width=d+'px';el.style.height=d+'px';
    el.style.transform='translate(-50%,-50%)';
    el.style.fontSize=Math.max(9,d*.38)+'px';
    el.textContent=f.n!=null?f.n:(f.label?f.label.slice(0,7):'');
  }
  if(t.assignable){
    const o=occ(f.id);
    if(o>0){el.classList.add('occupied');
      const b=document.createElement('div');b.className='badge';b.textContent=o;el.appendChild(b);
      if(f.cap>0&&o>f.cap)el.classList.add('over');else if(f.cap>0&&o>=f.cap)el.classList.add('full');
    }
  }
  if(f.id===openFurnId)el.classList.add('sel');
  if(mode==='resa'&&selResa&&t.assignable)el.classList.add('pulse');
  if(mode==='edit'&&(t.shape==='rect'||t.shape==='zone')){const hd=document.createElement('div');hd.className='rot';hd.title='Glisser pour pivoter';attachRotate(hd,el,f);el.appendChild(hd);}
  el.addEventListener('mouseenter',e=>showTip(f,e));
  el.addEventListener('mousemove',e=>moveTip(e));
  el.addEventListener('mouseleave',hideTip);
  attachPointer(el,f);
  return el;
}

/* ---------- pointer: drag (edit) / tap (assign) ---------- */
function attachPointer(el,f){
  let sx,sy,ox,oy,moved,downT;
  el.addEventListener('pointerdown',e=>{
    e.stopPropagation();downT=Date.now();moved=false;sx=e.clientX;sy=e.clientY;ox=f.x;oy=f.y;
    if(mode==='edit'){el.setPointerCapture(e.pointerId);}
  });
  el.addEventListener('pointermove',e=>{
    if(mode!=='edit')return;
    if(Math.abs(e.clientX-sx)+Math.abs(e.clientY-sy)>3){moved=true;
      f.x=Math.max(0,Math.min(S.w,ox+(e.clientX-sx)/scale));
      f.y=Math.max(0,Math.min(S.h,oy+(e.clientY-sy)/scale));
      el.style.left=f.x*scale+'px';el.style.top=f.y*scale+'px';
    }
  });
  el.addEventListener('pointerup',e=>{
    if(mode==='edit'){if(moved){save();}else{openFurn(f.id);}return;}
    // resa mode = tap
    const t=TYPES[f.type]||{};
    if(selResa&&t.assignable){assign(selResa,f.id);selResa=null;setHint();renderAll();}
    else{openFurn(f.id);}
  });
}

function attachRotate(hd,el,f){
  hd.addEventListener('pointerdown',e=>{e.stopPropagation();e.preventDefault();
    const onMove=ev=>{const r=el.getBoundingClientRect();const cx=r.left+r.width/2,cy=r.top+r.height/2;
      let a=Math.atan2(ev.clientY-cy,ev.clientX-cx)*180/Math.PI+90;
      a=ev.shiftKey?Math.round(a/15)*15:Math.round(a);
      f.ang=a;el.style.transform='translate(-50%,-50%) rotate('+a+'deg)';};
    const onUp=()=>{document.removeEventListener('pointermove',onMove);document.removeEventListener('pointerup',onUp);save();if(openFurnId===f.id)openFurn(f.id);};
    document.addEventListener('pointermove',onMove);document.addEventListener('pointerup',onUp);});
}

  document.getElementById('stats').innerHTML=`

   <div class="stat"><div class="k">Résas placées</div><div class="v">${plR}<small>/${totR}</small></div></div>
   <div class="stat"><div class="k">Couverts placés</div><div class="v">${plP}<small>/${totP}</small></div></div>

      ${r.notes?`<div class="note ${pref?'pref':''}">${pref?'★ ':''}${esc(r.notes)}</div>`:''}
      ${f?`<div class="assigned">✓ ${f.n!=null?'Table '+f.n:(cfg(f).label)} (${cfg(f).short}) <button data-un="${r.id}">retirer</button></div>`
         :`<button class="tinybtn editOnly" data-pick="${r.id}">${String(selResa)===String(r.id)?'➜ Touchez un emplacement sur le plan':'Placer sur le plan'}</button>`}`;

  b.querySelectorAll('#placedF .chip').forEach(c=>c.onclick=()=>{fPlaced=c.dataset.p;renderResaPanel();});
  b.querySelectorAll('#statusF .chip').forEach(c=>c.onclick=()=>{fStatus=c.dataset.s;renderResaPanel();});

function addFurn(type){if(!RW())return;
  const wrap=document.getElementById('stagewrap');
  const cx=(wrap.scrollLeft+wrap.clientWidth/2)/scale, cy=(wrap.scrollTop+wrap.clientHeight/2)/scale;
  const f={id:'f'+Date.now(),type,x:cx,y:cy,cap:TYPES[type].cap,ang:0};
  if(TYPES[type].assignable&&type!=='traiteur')f.n=nextNum();
  if(TYPES[type].shape==='rect'){f.L=type==='traiteur'?150:200;f.Wd=44;}

function importCSV(text){
  if(/Ã|Â/.test(text)){try{const dec=new TextDecoder('latin1');}catch(e){}}
  const lines=text.split(/\r?\n/);
  let hi=lines.findIndex(l=>/N\s*[°ø]?\s*;/.test(l)||l.toLowerCase().startsWith('n°;')||l.toLowerCase().includes('nom / structure'));

function roundRect(x,X,Y,w,h,r){r=Math.min(r,w/2,h/2);x.beginPath();x.moveTo(X+r,Y);x.arcTo(X+w,Y,X+w,Y+h,r);x.arcTo(X+w,Y+h,X,Y+h,r);x.arcTo(X,Y+h,X,Y,r);x.arcTo(X,Y,X+w,Y,r);x.closePath();}
function hexPath(x,cx,cy,r){x.beginPath();for(let i=0;i<6;i++){const a=Math.PI/180*(60*i);const px=cx+r*Math.cos(a),py=cy+r*Math.sin(a);i?x.lineTo(px,py):x.moveTo(px,py);}x.closePath();}
function hexToRgb(h){return [parseInt(h.slice(0,2),16),parseInt(h.slice(2,4),16),parseInt(h.slice(4,6),16)];}
function planImageEl(){return new Promise(res=>{const bg=curBg();if(!bg){res(null);return;}const im=new Image();im.onload=()=>res(im);im.onerror=()=>res(null);im.src=bg;});}
async function renderPlanCanvas(mult){mult=mult||2;
  const W=Math.round(S.w*mult),H=Math.round(S.h*mult);
  const cv=document.createElement('canvas');cv.width=W;cv.height=H;const x=cv.getContext('2d');
  x.fillStyle='#cdd5dd';x.fillRect(0,0,W,H);
  const img=await planImageEl();if(img)x.drawImage(img,0,0,W,H);
  x.textAlign='center';x.textBaseline='middle';x.lineJoin='round';
  S.furn.forEach(f=>{const t=cfg(f);const col=cssColorToHex(t.color);const cx=f.x*mult,cy=f.y*mult;
    x.save();x.fillStyle=col;x.strokeStyle='rgba(0,0,0,.32)';x.lineWidth=2*mult;
    if(t.shape==='rect'||t.shape==='zone'){const L=(f.L||160)*mult,Wd=Math.max(f.Wd||44,30)*mult;
      x.translate(cx,cy);x.rotate((f.ang||0)*Math.PI/180);roundRect(x,-L/2,-Wd/2,L,Wd,8*mult);x.fill();x.stroke();
      x.fillStyle='#fff';x.font='bold '+Math.max(11,Wd*0.42)+'px Arial';
      x.fillText(f.label?f.label:(f.n!=null?(t.short+' '+f.n):t.short),0,0);
    } else {const d=(t.d||48)*mult,r=d/2;
      if(t.shape==='hex')hexPath(x,cx,cy,r);else if(t.shape==='sq')roundRect(x,cx-r,cy-r,d,d,6*mult);else{x.beginPath();x.arc(cx,cy,r,0,7);}
      x.fill();x.stroke();x.fillStyle='#08243a';x.font='bold '+Math.max(11,d*0.4)+'px Arial';
      x.fillText(f.n!=null?(''+f.n):(f.label?f.label.slice(0,6):''),cx,cy);}
    x.restore();
    if(t.assignable){const o=occ(f.id);if(o>0){const r=(t.d||48)*mult/2;
      const half=(t.shape==='rect'||t.shape==='zone');
      const bx=cx+(half?(f.L||160)*mult/2*0.72:r*0.72), by=cy-(half?Math.max(f.Wd||44,30)*mult/2*0.72:r*0.72);
      x.beginPath();x.arc(bx,by,9*mult,0,7);x.fillStyle='#1F3A5F';x.fill();x.lineWidth=2*mult;x.strokeStyle='#fff';x.stroke();
      x.fillStyle='#fff';x.font='bold '+(10*mult)+'px Arial';x.textAlign='center';x.textBaseline='middle';x.fillText(''+o,bx,by);}}
  });
  return cv;
}

  m.innerHTML=`<h3><span>Aide &amp; sauvegarde</span><button id="mclose">×</button></h3><div class="mbody" style="font-size:13px;line-height:1.6;color:#334155">
   <p><b>Placer une résa :</b> onglet <i>Réservations</i> → « Placer sur le plan » → touchez l'emplacement. Ou touchez un emplacement puis choisissez la résa.</p>
   <p><b>Déplacer / ajouter / supprimer un meuble :</b> bouton <i>Éditer le plan</i> en haut du plan, puis glissez ou touchez les meubles. Onglet <i>Mobilier</i> pour en ajouter.</p>
   <p><b>Capacité &amp; alertes :</b> chaque emplacement a une capacité modifiable. Liseré orange = complet, rouge = dépassé.</p>
   <p><b>Plusieurs événements :</b> la barre sous le titre liste tes événements. <i>＋ Événement</i> en crée un nouveau (plan, mobilier et résas séparés) ; <i>🖼</i> change le fond ; <b>⚙</b> ouvre les <b>paramètres</b> (nom, organisateur, jauge max) ; <b>×</b> supprime l'événement courant.</p>
   <p><b>Réservations (par événement) :</b> <i>📄 Modèle</i> télécharge le fichier vierge à faire remplir ; une fois rempli, <i>⬆ Importer CSV</i> l'injecte dans l'<b>événement actif</b> (placements conservés, nouvelles résas ajoutées). Tu peux aussi saisir les résas à la main (＋ Ajouter une réservation).</p>
   <p><b>Export :</b> <i>⬇ Exporter</i> sort un CSV (qui est placé où, tables, couverts) pour l'événement courant.</p>
   <p style="background:#fff7ef;border:1px solid #f5d7b0;border-radius:10px;padding:10px"><b>Sauvegarde :</b> tout est enregistré automatiquement dans <b>ce navigateur</b> (tous les événements). Pour un usage partagé/multi-appareils sur Netlify, on branchera Netlify Blobs.</p>
   <button class="del" id="logoutBtn" style="background:#eef2f7">🔓 Changer de code / se déconnecter</button>
   <button class="del adminOnly" style="background:#fee2e2" id="resetAll">↺ Tout réinitialiser (supprime TOUS les événements)</button>
   </div>`;
  document.getElementById('modalBg').classList.add('show');
  document.getElementById('mclose').onclick=closeModal;
  document.getElementById('logoutBtn').onclick=logout;
  document.getElementById('resetAll').onclick=()=>{if(!isAdmin())return;if(confirm('Réinitialiser TOUS les événements (pour tout le monde) ? Tout sera perdu.')){localStorage.removeItem('gfca_evt_cache');DB=normalize(defaultDB());localTs=Date.now();S=curEvent();closeModal();gateRender();pushRemote();}};
};

/* ---------- modes / tabs / zoom ---------- */
function setMode(m){if(m==='edit'&&!RW())return;mode=m;
  document.getElementById('mResa').classList.toggle('on',m==='resa');
  document.getElementById('mEdit').classList.toggle('on',m==='edit');
  document.getElementById('tabResa').classList.toggle('on',m==='resa');
  document.getElementById('tabEdit').classList.toggle('on',m==='edit');
  selResa=null;setHint();renderAll();}
document.getElementById('mResa').onclick=()=>setMode('resa');
document.getElementById('mEdit').onclick=()=>setMode('edit');
document.getElementById('tabResa').onclick=()=>setMode('resa');
document.getElementById('tabEdit').onclick=()=>setMode('edit');
function setHint(){const h=document.getElementById('hint');
  if(mode==='resa'&&selResa){const r=R(selResa);if(!r){h.style.display='none';return;}h.style.display='block';h.textContent='➜ Touchez l\'emplacement pour « '+r.nom+' » ('+r.pax+' pers.)';}
  else if(mode==='edit'){h.style.display='block';h.textContent='Mode édition : glissez pour déplacer · touchez pour modifier · poignée ↻ pour pivoter';}
  else h.style.display='none';}
document.getElementById('zin').onclick=()=>setScale(scale*1.25);
document.getElementById('zout').onclick=()=>setScale(scale/1.25);
document.getElementById('zfit').onclick=fit;
document.getElementById('opa').oninput=e=>{stage.style.opacity=e.target.value/100;};
document.getElementById('stagewrap').addEventListener('wheel',e=>{if(e.ctrlKey||e.metaKey){e.preventDefault();setScale(scale*(e.deltaY<0?1.1:.9));}},{passive:false});

/* mobile sidebar */
document.getElementById('fab').onclick=()=>document.getElementById('side').classList.toggle('open');
function closeSide(){document.getElementById('side').classList.remove('open');}

function renderEventTabs(){
  const bar=document.getElementById('eventbar');
  const evs=visibleEvents();
  if(!evs.length){bar.innerHTML='<div class="evtab" style="opacity:.85">Aucun événement ne vous est attribué</div>';
    const sp0=document.querySelector('header .brand span');if(sp0)sp0.textContent='—';return;}
  bar.innerHTML=evs.map(e=>`<div class="evtab ${e.id===DB.curId?'on':''}" data-ev="${e.id}">
     <span>${esc(e.name)}</span>
     ${(e.id===DB.curId&&isAdmin())?`<button data-ren="${e.id}" title="Paramètres">⚙</button><button data-del="${e.id}" title="Supprimer">×</button>`:''}
   </div>`).join('')
   +(isAdmin()?`<button class="evtadd" id="evtAdd">＋ Événement</button>`:'')
   +`<button class="evtbg editOnly" id="evtBg">🖼 ${curBg()?'Changer le fond':'Ajouter un fond'}</button>`;
  bar.querySelectorAll('.evtab').forEach(t=>t.onclick=ev=>{if(ev.target.dataset.ren!=null||ev.target.dataset.del!=null)return;if(t.dataset.ev)setEvent(t.dataset.ev);});
  bar.querySelectorAll('[data-ren]').forEach(x=>x.onclick=ev=>{ev.stopPropagation();openEventSettings(x.dataset.ren);});
  bar.querySelectorAll('[data-del]').forEach(x=>x.onclick=ev=>{ev.stopPropagation();deleteEvent(x.dataset.del);});
  const ea=document.getElementById('evtAdd');if(ea)ea.onclick=addEvent;
  document.getElementById('evtBg').onclick=()=>{if(!RW())return;document.getElementById('bgIn').click();};
  const e=curEvent();const sp=document.querySelector('header .brand span');if(sp)sp.textContent=(e?e.name:'')+(e&&e.organizer?' · '+e.organizer:'');
}
function openEventSettings(id){if(!isAdmin())return;const e=DB.events.find(x=>x.id===id);const m=document.getElementById('modal');
  const orgas=DB.users.filter(u=>u.role!=='admin');
  const accRows=orgas.length?orgas.map(u=>{const a=(e.access||[]).find(x=>x.u===u.id);
     return `<div style="display:flex;gap:8px;align-items:center;margin-bottom:6px">
      <label style="flex:1;display:flex;gap:6px;align-items:center;font-size:13px"><input type="checkbox" data-acc="${u.id}" ${a?'checked':''}> ${esc(u.name)}</label>
      <select data-accr="${u.id}" style="padding:6px;border-radius:8px;border:1px solid #d8d2c6"><option value="edit" ${a&&a.r==='edit'?'selected':''}>Édition</option><option value="read" ${a&&a.r==='read'?'selected':''}>Lecture seule</option></select></div>`;}).join(''):'<div style="font-size:12px;color:#94a3b8">Aucun organisateur (ajoute-les via 👥 Accès).</div>';
  m.innerHTML=`<h3><span>Paramètres de l'événement</span><button id="mclose">×</button></h3><div class="mbody">
   <div class="editrow"><label>Nom</label><input id="evN" value="${esc(e.name)}"></div>
   <div class="editrow"><label>Organisateur</label><input id="evO" value="${esc(e.organizer||'')}" placeholder="ex : GFCA Handball"></div>
   <div class="editrow"><label>Jauge max</label><input id="evM" type="number" min="0" value="${e.maxCap||''}" placeholder="nb de personnes"> pers.</div>
   <div class="sectlabel" style="margin-top:8px">Accès organisateurs</div>${accRows}
   <button class="addresa" id="evSave" style="background:var(--orange);color:#241f15;border:none;margin-top:6px">✓ Enregistrer</button>
   <button class="del" id="evDel">🗑 Supprimer cet événement</button>
   </div>`;
  document.getElementById('modalBg').classList.add('show');
  document.getElementById('mclose').onclick=closeModal;
  document.getElementById('evSave').onclick=()=>{e.name=document.getElementById('evN').value.trim()||e.name;
    e.organizer=document.getElementById('evO').value.trim();e.maxCap=parseInt(document.getElementById('evM').value)||0;
    e.access=orgas.filter(u=>{const cb=document.querySelector('[data-acc="'+u.id+'"]');return cb&&cb.checked;}).map(u=>({u:u.id,r:document.querySelector('[data-accr="'+u.id+'"]').value}));
    save();closeModal();renderEventTabs();renderStats();toast('Paramètres enregistrés');};
  document.getElementById('evDel').onclick=()=>deleteEvent(id);
}
function downloadTemplate(){const e=curEvent();
  const head=['N°','Date réception','Nom / Structure','Catégorie','Nb personnes','Numéro de contact','Email','Statut','Notes'];
  const title=`Suivi des réservations - ${e.name} - Organisateur: ${e.organizer||''} - Jauge max: ${e.maxCap||''}`;
  const ex=['1','','Exemple Dupont','Grand public','6','06 12 34 56 78','','Confirmée','Exemple - à remplacer ou supprimer'];
  const escc=v=>{v=(''+v);return /[;"\n]/.test(v)?'"'+v.replace(/"/g,'""')+'"':v;};
  const csv='\ufeff'+[[title],[],head,ex].map(r=>r.map(escc).join(';')).join('\r\n');
  const blob=new Blob([csv],{type:'text/csv;charset=utf-8'});const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);a.download='modele_resas_'+(e.name||'evenement').replace(/[^a-z0-9]+/gi,'_').toLowerCase()+'.csv';a.click();
  toast('Modèle téléchargé — à remplir puis « Importer CSV »');
}
document.getElementById('modeleBtn').onclick=downloadTemplate;
function setEvent(id){const ev=DB.events.find(e=>e.id===id);if(!canSee(ev))return;DB.curId=id;S=curEvent();selResa=null;openFurnId=null;if(!RW())mode='resa';save();applyRole();renderEventTabs();fit();renderAll();}
function freshEvent(name){return {id:'evt'+Date.now(),name:(name||'Nouvel événement'),organizer:'',maxCap:0,builtin:true,bg:null,w:2000,h:2000,furn:[],resa:[],access:[]};}
function addEvent(){if(!isAdmin())return;const name=prompt('Nom du nouvel événement :','Nouvel événement');if(!name||!name.trim())return;
  const e=freshEvent(name.trim());DB.events.push(e);setEvent(e.id);toast('Événement créé sur le fond Peraldi — ajoute ton mobilier (onglet Mobilier)');}
function deleteEvent(id){if(!isAdmin())return;const e=DB.events.find(x=>x.id===id);if(!e)return;
  if(!confirm('Supprimer l\'événement « '+e.name+' » avec son plan et ses réservations ?'))return;
  closeModal();
  DB.events=DB.events.filter(x=>x.id!==id);
  if(DB.events.length===0){const f=freshEvent('Nouvel événement');DB.events.push(f);DB.curId=f.id;}
  else if(DB.curId===id){DB.curId=DB.events[0].id;}
  setEvent(DB.curId);toast('Événement supprimé');}
document.getElementById('bgIn').onchange=e=>{if(!RW())return;const file=e.target.files[0];if(!file)return;
  const rd=new FileReader();rd.onload=()=>{const img=new Image();img.onload=()=>{
    const maxd=1700;let w=img.width,h=img.height;const sc=Math.min(1,maxd/Math.max(w,h));
    w=Math.round(w*sc);h=Math.round(h*sc);
    const cv=document.createElement('canvas');cv.width=w;cv.height=h;cv.getContext('2d').drawImage(img,0,0,w,h);
    S.bg=cv.toDataURL('image/jpeg',0.82);S.builtin=false;S.w=w;S.h=h;save();renderEventTabs();fit();renderAll();toast('Fond mis à jour');
  };img.src=rd.result;};rd.readAsDataURL(file);e.target.value='';};

function renderAll(){applyRole();renderStats();renderStage();if(mode==='edit')renderEditPanel();else renderResaPanel();}
function esc(s){return (s==null?'':''+s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
let toT;function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(toT);toT=setTimeout(()=>t.classList.remove('show'),2200);}

function openAccess(){if(!isAdmin())return;const m=document.getElementById('modal');
  const admin=DB.users.find(u=>u.role==='admin')||DB.users[0];
  m.innerHTML=`<h3><span>Accès &amp; organisateurs</span><button id="mclose">×</button></h3><div class="mbody">
   <div class="sectlabel">Administrateur</div>
   <div class="editrow"><label>Code admin</label><input id="acAdmin" value="${esc(admin.code)}"></div>
   <div class="sectlabel" style="margin-top:10px">Organisateurs</div><div id="acList"></div>
   <div class="sectlabel" style="margin-top:10px">Ajouter un organisateur</div>
   <div style="display:flex;gap:6px;margin-bottom:4px"><input id="acName" placeholder="nom" style="flex:1"><input id="acCode" placeholder="code" style="width:120px"></div>
   <button class="addresa" id="acAdd" style="background:var(--navy);color:#fff;border:none;margin-top:2px">＋ Ajouter l'organisateur</button>
   <button class="addresa" id="acSave" style="background:var(--gold);color:#241f15;border:none;margin-top:10px">✓ Enregistrer</button>
   <p style="font-size:12px;color:#64748b;margin-top:8px">Attribue ensuite un organisateur à un événement via ⚙ sur son onglet (Édition ou Lecture seule).</p>
   </div>`;
  document.getElementById('modalBg').classList.add('show');document.getElementById('mclose').onclick=closeModal;
  function paint(){const l=document.getElementById('acList');const os=DB.users.filter(u=>u.role!=='admin');
    l.innerHTML=os.length?os.map(u=>`<div style="display:flex;gap:6px;align-items:center;margin-bottom:6px"><input data-uname="${u.id}" value="${esc(u.name)}" style="flex:1"><input data-ucode="${u.id}" value="${esc(u.code)}" style="width:120px"><button class="iconbtn" data-udel="${u.id}" title="Retirer">🗑</button></div>`).join(''):'<div style="font-size:12px;color:#94a3b8;margin:4px 0">Aucun organisateur.</div>';
    l.querySelectorAll('[data-udel]').forEach(b=>b.onclick=()=>{const id=b.dataset.udel;DB.users=DB.users.filter(u=>u.id!==id);DB.events.forEach(e=>e.access=(e.access||[]).filter(a=>a.u!==id));save();paint();});}
  paint();
  document.getElementById('acAdd').onclick=()=>{const n=document.getElementById('acName').value.trim(),c=document.getElementById('acCode').value.trim();
    if(!n||!c){toast('Nom et code requis');return;}if(DB.users.some(u=>u.code===c)){toast('Ce code est déjà pris');return;}
    DB.users.push({id:'u_'+Date.now(),name:n,code:c,role:'orga'});save();document.getElementById('acName').value='';document.getElementById('acCode').value='';paint();toast('Organisateur ajouté');};
  document.getElementById('acSave').onclick=()=>{const ac=document.getElementById('acAdmin').value.trim();
    if(ac){const ad=DB.users.find(u=>u.role==='admin');if(ad)ad.code=ac;if(ME&&ME.role==='admin'){try{localStorage.setItem('gfca_code',ac);}catch(e){}}}
    document.querySelectorAll('[data-uname]').forEach(i=>{const u=DB.users.find(x=>x.id===i.dataset.uname);if(u)u.name=i.value.trim()||u.name;});
    document.querySelectorAll('[data-ucode]').forEach(i=>{const u=DB.users.find(x=>x.id===i.dataset.ucode);if(u&&i.value.trim())u.code=i.value.trim();});
    save();resolveMe();applyRole();closeModal();renderEventTabs();toast('Accès enregistrés');};
}
document.getElementById('accessBtn').onclick=openAccess;
document.getElementById('logBtn').onclick=doLogin;
document.getElementById('logCode').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});
window.addEventListener('resize',()=>renderStage());
DB=normalize(DB);
gateRender();
initSync().then(gateRender);
setInterval(pullRemote,8000);window.addEventListener('focus',pullRemote);
</script>
